source = ./extra.conf
env = GTK_IM_MODULE,kime
env = QT_IM_MODULE,kime
env = XMODIFIERS,@im=kime
env = PATH,$HOME/.local/bin:/usr/local/texlive/2026/bin/x86_64-linux:$PATH

exec-once = ironbar &
exec-once = xrdb ~/.Xresources
exec-once = awww-daemon &
exec-once = ~/.config/hypr/wallpaper-cycle.sh &
exec-once = kime
exec-once = thunderbird &
exec-once = discord &

animation = global, 0

$mod = SUPER

bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

bind = $mod, Return, exec, kitty
bind = $mod, Space, exec, rofi -show drun

bind = $mod, q, killactive
bind = $mod SHIFT, q, exec, hyprshutdown
bind = $mod SHIFT, l, exec, hyprlock

bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

bind = $mod SHIFT, h, movewindoworgroup, l
bind = $mod SHIFT, j, movewindoworgroup, d
bind = $mod SHIFT, k, movewindoworgroup, u
bind = $mod SHIFT, l, movewindoworgroup, r

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, m, workspace, name:mail
bind = $mod, d, workspace, name:discord
bind = $mod, s, workspace, name:slack

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod SHIFT, m, movetoworkspace, name:mail
bind = $mod SHIFT, d, movetoworkspace, name:discord
bind = $mod SHIFT, s, movetoworkspace, name:slack

bind = $mod SHIFT, F3, exec, grim - | wl-copy
bind = $mod SHIFT, F4, exec, grim -g "$(slurp)" - | wl-copy

bind = $mod, c, centerwindow

input {
  kb_options = korean:ralt_hangul, korean:rctrl_hanja
}

windowrule = match:class ^org\.mozilla\.Thunderbird$, workspace name:mail
windowrule = match:class ^discord$, workspace name:discord
windowrule = match:class ^Slack$, workspace name:slack

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind = $mod, g, togglegroup
bind = $mod, tab, changegroupactive, f
bind = $mod SHIFT, tab, changegroupactive, b

group {
  auto_group = true
  insert_after_current = true
  drag_into_group = 1

  groupbar {
    enabled = true
    render_titles = true
    font_family = JetBrains Mono
    font_size = 12
    height = 18
    gradients = true
  }
}
